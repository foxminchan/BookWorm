version: "1.0"
name: "bookworm-rating-agent-governance"
description: >
  Governance policy for the BookWorm Rating service agent.
  Permits read-only access to book and review data for
  LLM-based review summarization. Blocks all write operations
  (create, update, delete) to prevent unauthorized data mutation.
  All actions are audit-logged.

rules:
  - name: "block_write_operations"
    condition:
      field: "tool_name"
      operator: "contains_any"
      value: "create_review,update_review,delete_review"
    action: "deny"
    priority: 100
    message: "Write operations (create/update/delete review) are prohibited — agent has read-only access"

  - name: "allow_read_tools"
    condition:
      field: "tool_name"
      operator: "contains_any"
      value: "get_book,get_book_reviews,get_review,list_reviews"
    action: "allow"
    priority: 50
    message: "Read-only book and review operations are permitted for summarization"

  - name: "audit_all_actions"
    condition:
      field: "message_count"
      operator: "gte"
      value: 0
    action: "audit"
    priority: 10
    message: "All agent actions are audit-logged for compliance"

defaults:
  action: "deny"
  max_tokens: 4096
  max_tool_calls: 10
  confidence_threshold: 0.8
