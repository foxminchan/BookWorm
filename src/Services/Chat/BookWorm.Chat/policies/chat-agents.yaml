version: "1.0"
name: "bookworm-chat-agents-governance"
description: >
  Per-agent governance policy for the BookWorm Chat service.
  BookAgent is permitted to invoke catalog tools for book search
  and retrieval. All other agents (Router, Language, Summarize,
  Sentiment, QA) are denied tool calls — they operate as pure
  LLM responders without tool access. All actions are audit-logged.

rules:
  - name: "book_agent_catalog_tools"
    condition:
      field: "agent_id"
      operator: "equals"
      value: "book-agent"
    action: "allow"
    priority: 60
    message: "BookAgent is permitted to invoke catalog tools for book search and retrieval"

  - name: "router_agent_no_tools"
    condition:
      field: "agent_id"
      operator: "equals"
      value: "router-agent"
    action: "deny"
    priority: 50
    message: "RouterAgent operates as a pure LLM responder — tool calls are denied"

  - name: "language_agent_no_tools"
    condition:
      field: "agent_id"
      operator: "equals"
      value: "language-agent"
    action: "deny"
    priority: 50
    message: "LanguageAgent operates as a pure LLM responder — tool calls are denied"

  - name: "summarize_agent_no_tools"
    condition:
      field: "agent_id"
      operator: "equals"
      value: "summarize-agent"
    action: "deny"
    priority: 50
    message: "SummarizeAgent operates as a pure LLM responder — tool calls are denied"

  - name: "sentiment_agent_no_tools"
    condition:
      field: "agent_id"
      operator: "equals"
      value: "sentiment-agent"
    action: "deny"
    priority: 50
    message: "SentimentAgent operates as a pure LLM responder — tool calls are denied"

  - name: "qa_agent_no_tools"
    condition:
      field: "agent_id"
      operator: "equals"
      value: "qa-agent"
    action: "deny"
    priority: 50
    message: "QAAgent operates as a pure LLM responder — tool calls are denied"

  - name: "audit_all_actions"
    condition:
      field: "message_count"
      operator: "gte"
      value: 0
    action: "audit"
    priority: 10
    message: "All agent actions are audit-logged for compliance"

defaults:
  action: "deny"
  max_tokens: 4096
  max_tool_calls: 10
  confidence_threshold: 0.8
