version: "1.0"
name: "bookworm-mcp-tools-governance"
description: >
  Governance policy for the BookWorm MCP Tools server.
  Permits catalog and review tool invocations exposed to
  external LLM clients. Blocks dangerous tools (shell, file
  write/delete, raw HTTP). Rate-limits all tool calls to
  100 requests per minute. All actions are audit-logged.

rules:
  - name: "block_dangerous_tools"
    condition:
      field: "tool_name"
      operator: "contains_any"
      value: "shell_exec,file_write,file_delete,http_request"
    action: "deny"
    priority: 100
    message: "Dangerous tool execution (shell, file write/delete, raw HTTP) is prohibited by security policy"

  - name: "allow_catalog_tools"
    condition:
      field: "tool_name"
      operator: "contains_any"
      value: "search_catalog,get_book,get_book_details,list_categories"
    action: "allow"
    priority: 50
    message: "Catalog tool invocations are permitted for external LLM clients"

  - name: "allow_review_tools"
    condition:
      field: "tool_name"
      operator: "contains_any"
      value: "get_book_reviews,get_review,list_reviews"
    action: "allow"
    priority: 50
    message: "Review tool invocations are permitted for external LLM clients"

  - name: "rate_limit_all_tools"
    condition:
      field: "tool_name"
      operator: "contains_any"
      value: "search_catalog,get_book,get_book_details,list_categories,get_book_reviews,get_review,list_reviews"
    action: "rate_limit"
    priority: 40
    limit: "100/minute"
    message: "MCP tool calls are rate-limited to 100 requests per minute"

  - name: "audit_all_actions"
    condition:
      field: "message_count"
      operator: "gte"
      value: 0
    action: "audit"
    priority: 10
    message: "All agent actions are audit-logged for compliance"

defaults:
  action: "deny"
  max_tokens: 4096
  max_tool_calls: 10
  confidence_threshold: 0.8
