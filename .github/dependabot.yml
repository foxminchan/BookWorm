enable-beta-ecosystems: true
registries:
  public-nuget:
    type: nuget-feed
    url: https://api.nuget.org/v3/index.json
updates:
  - commit-message:
      include: scope
      prefix: .NET SDK
    directory: /
    labels:
      - dependencies
      - dotnet
    package-ecosystem: dotnet-sdk
    schedule:
      day: friday
      interval: weekly
      time: "10:00"
      timezone: Asia/Ho_Chi_Minh
  - commit-message:
      include: scope
      prefix: Devcontainer
    directory: /
    labels:
      - dependencies
      - devcontainers
    package-ecosystem: devcontainers
    schedule:
      day: friday
      interval: weekly
      time: "10:00"
      timezone: Asia/Ho_Chi_Minh
  - commit-message:
      include: scope
      prefix: NuGet
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 3
    directory: /
    groups:
      AspNetCore:
        patterns:
          - Microsoft.AspNetCore.*
          - Microsoft.Extensions.Features
        update-types:
          - minor
          - patch
      Aspire:
        patterns:
          - Aspire.*
        update-types:
          - minor
          - patch
      CommunityToolkit:
        patterns:
          - CommunityToolkit.*
        update-types:
          - minor
          - patch
      ContractTesting:
        patterns:
          - Verify.*
        update-types:
          - minor
          - patch
      EntityFrameworkCore:
        patterns:
          - Microsoft.EntityFrameworkCore.*
          - EFCore.*
        update-types:
          - minor
          - patch
      Grpc:
        patterns:
          - Grpc.*
        update-types:
          - minor
          - patch
      MicrosoftAgents:
        patterns:
          - Microsoft.Agents.*
        update-types:
          - minor
          - patch
      MicrosoftExtensions:
        patterns:
          - Microsoft.Extensions.Caching.*
          - Microsoft.Extensions.Compliance.*
          - Microsoft.Extensions.Http.*
          - Microsoft.Extensions.ServiceDiscovery*
          - Microsoft.Extensions.AI.*
        update-types:
          - minor
          - patch
      MicrosoftTesting:
        patterns:
          - Microsoft.Testing.*
        update-types:
          - minor
          - patch
      OpenTelemetry:
        patterns:
          - OpenTelemetry.*
        update-types:
          - minor
          - patch
      Quartz:
        patterns:
          - Quartz.*
        update-types:
          - minor
          - patch
      SemanticKernel:
        patterns:
          - Microsoft.SemanticKernel.*
      Testing:
        patterns:
          - TUnit*
          - Bogus
          - Moq
          - Shouldly
          - TngTech.ArchUnitNET.*
        update-types:
          - minor
          - patch
      Wolverine:
        patterns:
          - Wolverine*
        update-types:
          - minor
          - patch
      nuget-security:
        applies-to: security-updates
        patterns:
          - "*"
        update-types:
          - patch
          - minor
    labels:
      - dependencies
      - dotnet
    open-pull-requests-limit: 15
    package-ecosystem: nuget
    registries:
      - public-nuget
    schedule:
      day: friday
      interval: weekly
      time: "10:00"
      timezone: Asia/Ho_Chi_Minh
  - commit-message:
      include: scope
      prefix: Node (Event Catalog)
    directory: /docs/eventcatalog
    groups:
      eventcatalog:
        patterns:
          - "@eventcatalog/*"
    labels:
      - dependencies
      - javascript
      - documentation
    open-pull-requests-limit: 10
    package-ecosystem: npm
    schedule:
      day: friday
      interval: weekly
      time: "10:00"
      timezone: Asia/Ho_Chi_Minh
    versioning-strategy: increase
  - commit-message:
      include: scope
      prefix: Node (Docusaurus)
    directory: /docs/docusaurus
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
      react:
        patterns:
          - react
          - react-dom
          - "@types/react*"
    labels:
      - dependencies
      - javascript
      - documentation
    open-pull-requests-limit: 10
    package-ecosystem: npm
    schedule:
      day: friday
      interval: weekly
      time: "10:00"
      timezone: Asia/Ho_Chi_Minh
    versioning-strategy: increase
  - commit-message:
      include: scope
      prefix: Node (k6)
    directory: /src/Aspire/BookWorm.AppHost/Container/k6
    groups:
      babel:
        patterns:
          - "@babel/*"
      build-tools:
        patterns:
          - webpack*
          - "*-loader"
    labels:
      - dependencies
      - javascript
      - testing
    open-pull-requests-limit: 10
    package-ecosystem: npm
    schedule:
      day: friday
      interval: weekly
      time: "10:00"
      timezone: Asia/Ho_Chi_Minh
    versioning-strategy: increase
  - commit-message:
      include: scope
      prefix: Node (Keycloakify)
    directory: /src/Aspire/BookWorm.AppHost/Container/keycloak/keycloakify
    groups:
      keycloakify:
        patterns:
          - keycloakify
          - "@keycloakify/*"
      react:
        patterns:
          - react
          - react-dom
          - "@types/react*"
      storybook:
        patterns:
          - "@storybook/*"
          - storybook
    ignore:
      - dependency-name: "tailwindcss"
    labels:
      - dependencies
      - javascript
    open-pull-requests-limit: 10
    package-ecosystem: npm
    schedule:
      day: friday
      interval: weekly
      time: "10:00"
      timezone: Asia/Ho_Chi_Minh
    versioning-strategy: increase
  - commit-message:
      include: scope
      prefix: Node (Frontend)
    cooldown:
      default-days: 3
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 2
    directory: /src/Clients
    groups:
      better-auth:
        patterns:
          - better-auth
      eslint:
        patterns:
          - eslint*
          - "@typescript-eslint/*"
      frontend-security:
        applies-to: security-updates
        patterns:
          - "*"
        update-types:
          - patch
          - minor
      nextjs:
        patterns:
          - next
          - "@next/*"
          - eslint-config-next
      radix:
        patterns:
          - "@radix-ui/*"
      react:
        patterns:
          - react
          - react-dom
          - "@types/react*"
      tanstack:
        patterns:
          - "@tanstack/*"
      turbo:
        patterns:
          - turbo
          - "@turbo/*"
      typescript:
        patterns:
          - typescript
          - "@types/*"
    labels:
      - dependencies
      - javascript
      - frontend
    open-pull-requests-limit: 15
    package-ecosystem: npm
    schedule:
      day: friday
      interval: weekly
      time: "10:00"
      timezone: Asia/Ho_Chi_Minh
    versioning-strategy: increase
  - commit-message:
      include: scope
      prefix: Docker
    directories:
      - /src/Clients/apps/storefront
      - /src/Clients/apps/backoffice
    labels:
      - dependencies
      - docker
    package-ecosystem: docker
    schedule:
      day: friday
      interval: weekly
      time: "10:00"
      timezone: Asia/Ho_Chi_Minh
  - commit-message:
      include: scope
      prefix: GitHub Actions
    directories:
      - /
      - /.github/actions/*
    groups:
      github-actions-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "github/gh-aw-actions"
      - dependency-name: "github/gh-aw-actions/**" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
    labels:
      - dependencies
      - github-actions
    package-ecosystem: github-actions
    schedule:
      day: friday
      interval: weekly
      time: "10:00"
      timezone: Asia/Ho_Chi_Minh
version: 2
