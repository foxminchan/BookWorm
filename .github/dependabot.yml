# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
# https://containers.dev/guide/dependabot

version: 2
enable-beta-ecosystems: true
registries:
  public-nuget:
    type: nuget-feed
    url: https://api.nuget.org/v3/index.json
updates:
  # ── .NET SDK (global.json) ────────────────────────────────────────────
  - package-ecosystem: dotnet-sdk
    directory: "/"
    schedule:
      interval: weekly
      day: friday
      time: "10:00"
      timezone: "Asia/Ho_Chi_Minh"
    labels:
      - "dependencies"
      - "dotnet"
    commit-message:
      prefix: ".NET SDK"
      include: scope

  # ── Dev Containers ────────────────────────────────────────────────────
  - package-ecosystem: devcontainers
    directory: "/"
    schedule:
      interval: weekly
      day: friday
      time: "10:00"
      timezone: "Asia/Ho_Chi_Minh"
    labels:
      - "dependencies"
      - "devcontainers"
    commit-message:
      prefix: "Devcontainer"
      include: scope

  # ── NuGet (.NET) ──────────────────────────────────────────────────────
  - package-ecosystem: nuget
    directory: "/"
    registries:
      - public-nuget
    schedule:
      interval: weekly
      day: friday
      time: "10:00"
      timezone: "Asia/Ho_Chi_Minh"
    labels:
      - "dependencies"
      - "dotnet"
    commit-message:
      prefix: "NuGet"
      include: scope
    open-pull-requests-limit: 15
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 3
    ignore:
      - dependency-name: "MassTransit.*"
        update-types: ["version-update:semver-major"]
    groups:
      Aspire:
        patterns:
          - "Aspire.*"
        update-types: ["minor", "patch"]
      AspNetCore:
        patterns:
          - "Microsoft.AspNetCore.*"
          - "Microsoft.Extensions.Features"
        update-types: ["minor", "patch"]
      MicrosoftExtensions:
        patterns:
          - "Microsoft.Extensions.Caching.*"
          - "Microsoft.Extensions.Compliance.*"
          - "Microsoft.Extensions.Http.*"
          - "Microsoft.Extensions.ServiceDiscovery*"
          - "Microsoft.Extensions.AI.*"
        update-types: ["minor", "patch"]
      OpenTelemetry:
        patterns:
          - "OpenTelemetry.*"
        update-types: ["minor", "patch"]
      Grpc:
        patterns:
          - "Grpc.*"
        update-types: ["minor", "patch"]
      MassTransit:
        patterns:
          - "MassTransit.*"
        update-types: ["minor", "patch"]
      EntityFrameworkCore:
        patterns:
          - "Microsoft.EntityFrameworkCore.*"
          - "EFCore.*"
        update-types: ["minor", "patch"]
      MicrosoftAgents:
        patterns:
          - "Microsoft.Agents.*"
        update-types: ["minor", "patch"]
      SemanticKernel:
        patterns:
          - "Microsoft.SemanticKernel.*"
      CommunityToolkit:
        patterns:
          - "CommunityToolkit.*"
        update-types: ["minor", "patch"]
      Quartz:
        patterns:
          - "Quartz.*"
        update-types: ["minor", "patch"]
      Testing:
        patterns:
          - "TUnit*"
          - "Bogus"
          - "Moq"
          - "Shouldly"
          - "TngTech.ArchUnitNET.*"
        update-types: ["minor", "patch"]
      ContractTesting:
        patterns:
          - "Verify.*"
        update-types: ["minor", "patch"]
      MicrosoftTesting:
        patterns:
          - "Microsoft.Testing.*"
        update-types: ["minor", "patch"]
      nuget-security:
        applies-to: security-updates
        patterns:
          - "*"
        update-types: ["patch", "minor"]

  # ── npm: Event Catalog docs ───────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/docs/eventcatalog"
    schedule:
      interval: weekly
      day: friday
      time: "10:00"
      timezone: "Asia/Ho_Chi_Minh"
    labels:
      - "dependencies"
      - "javascript"
      - "documentation"
    commit-message:
      prefix: "Node (Event Catalog)"
      include: scope
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      eventcatalog:
        patterns:
          - "@eventcatalog/*"

  # ── npm: Docusaurus docs ──────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/docs/docusaurus"
    schedule:
      interval: weekly
      day: friday
      time: "10:00"
      timezone: "Asia/Ho_Chi_Minh"
    labels:
      - "dependencies"
      - "javascript"
      - "documentation"
    commit-message:
      prefix: "Node (Docusaurus)"
      include: scope
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"

  # ── npm: k6 load tests ───────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/src/Aspire/BookWorm.AppHost/Container/k6"
    schedule:
      interval: weekly
      day: friday
      time: "10:00"
      timezone: "Asia/Ho_Chi_Minh"
    labels:
      - "dependencies"
      - "javascript"
      - "testing"
    commit-message:
      prefix: "Node (k6)"
      include: scope
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      babel:
        patterns:
          - "@babel/*"
      build-tools:
        patterns:
          - "webpack*"
          - "*-loader"

  # ── npm: Keycloakify ──────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/src/Aspire/BookWorm.AppHost/Container/keycloak/keycloakify"
    schedule:
      interval: weekly
      day: friday
      time: "10:00"
      timezone: "Asia/Ho_Chi_Minh"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "Node (Keycloakify)"
      include: scope
    open-pull-requests-limit: 10
    versioning-strategy: increase
    ignore:
      - dependency-name: "tailwindcss"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      keycloakify:
        patterns:
          - "keycloakify"
          - "@keycloakify/*"
      storybook:
        patterns:
          - "@storybook/*"
          - "storybook"

  # ── npm: Frontend (pnpm monorepo) ────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/src/Clients"
    schedule:
      interval: weekly
      day: friday
      time: "10:00"
      timezone: "Asia/Ho_Chi_Minh"
    labels:
      - "dependencies"
      - "javascript"
      - "frontend"
    commit-message:
      prefix: "Node (Frontend)"
      include: scope
    open-pull-requests-limit: 15
    versioning-strategy: increase
    cooldown:
      default-days: 3
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 2
    groups:
      nextjs:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      tanstack:
        patterns:
          - "@tanstack/*"
      radix:
        patterns:
          - "@radix-ui/*"
      better-auth:
        patterns:
          - "better-auth"
      turbo:
        patterns:
          - "turbo"
          - "@turbo/*"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      eslint:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
      frontend-security:
        applies-to: security-updates
        patterns:
          - "*"
        update-types: ["patch", "minor"]

  # ── Docker ────────────────────────────────────────────────────────────
  - package-ecosystem: docker
    directories:
      - "/src/Clients/apps/storefront"
      - "/src/Clients/apps/backoffice"
    schedule:
      interval: weekly
      day: friday
      time: "10:00"
      timezone: "Asia/Ho_Chi_Minh"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "Docker"
      include: scope

  # ── GitHub Actions ────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directories:
      - "/"
      - "/.github/actions/*"
    schedule:
      interval: weekly
      day: friday
      time: "10:00"
      timezone: "Asia/Ho_Chi_Minh"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "GitHub Actions"
      include: scope
    ignore:
      - dependency-name: "github/gh-aw-actions"
    groups:
      github-actions-minor:
        patterns:
          - "*"
        update-types: ["minor", "patch"]
