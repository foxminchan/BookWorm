name: Bug Report
description: Create a report to help us improve
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 🐛

        Before submitting, please search [existing issues](https://github.com/foxminchan/BookWorm/issues) to avoid duplicates.
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched for existing issues and this is not a duplicate.
          required: true
        - label: I have read the [Contributing Guide](https://github.com/foxminchan/BookWorm/blob/main/.github/CONTRIBUTING.md).
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened.
      placeholder: What actually happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please complete the following information.
      placeholder: |
        - OS: [e.g. Windows 11, macOS 14, Ubuntu 22.04]
        - Browser / Runtime: [e.g. Chrome 123, .NET 10]
        - BookWorm version / commit: [e.g. v1.2.0 or abc1234]
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, logs, or screenshots that may help us understand the problem.
      placeholder: Paste logs, attach screenshots, or describe anything else relevant here.
  - type: dropdown
    id: contribute
    attributes:
      label: Would you like to contribute a fix?
      description: Let us know if you'd like to submit a pull request to address this bug.
      options:
        - "Yes, I'd like to submit a PR"
        - "I need guidance before contributing"
        - "No, just reporting"
    validations:
      required: true
