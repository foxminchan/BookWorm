name: Frontend Setup
description: >-
  Bootstrap the BookWorm frontend development environment by installing Bun
  and project dependencies
author: BookWorm Team
branding:
  icon: globe
  color: blue

inputs:
  bun-version-file:
    description: Path to the .bun-version file specifying the Bun runtime version
    required: false
    default: .bun-version
  bun-lock-path:
    description: Path to the bun.lock file for dependency caching
    required: false
    default: src/Clients/bun.lock
  working-directory:
    description: Working directory for bun install
    required: false
    default: src/Clients

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.2
      with:
        bun-version-file: ${{ inputs.bun-version-file }}

    - name: Cache Bun dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-frontend-${{ hashFiles(inputs.bun-lock-path) }}
        restore-keys: |
          ${{ runner.os }}-bun-frontend-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: bun install --frozen-lockfile --ignore-scripts
