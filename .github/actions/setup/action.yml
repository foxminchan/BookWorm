name: "Setup"
description: "Bootstrap the BookWorm development environment by installing .NET SDK, Bun runtime, dotnet tools, and configuring Husky git hooks"
author: "BookWorm Team"

branding:
  icon: "settings"
  color: "gray-dark"

inputs:
  global-json-file:
    description: "Path to the global.json file that specifies the .NET SDK version"
    required: false
    default: "./global.json"
  bun-version-file:
    description: "Path to the .bun-version file that specifies the Bun runtime version"
    required: false
    default: ".bun-version"

runs:
  using: "composite"
  steps:
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: ${{ inputs.global-json-file }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: ${{ inputs.bun-version-file }}

    - name: Install Tools
      shell: bash
      run: dotnet tool restore

    - name: Configure Husky
      shell: bash
      if: success()
      run: dnx husky install
