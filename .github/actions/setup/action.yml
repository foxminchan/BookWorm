name: Setup
description: >-
  Bootstrap the BookWorm development environment by installing .NET SDK, Bun
  runtime, dotnet tools, and configuring Husky git hooks
author: BookWorm Team
branding:
  icon: settings
  color: gray-dark

inputs:
  global-json-file:
    description: Path to the global.json file that specifies the .NET SDK version
    required: false
    default: global.json
  bun-version-file:
    description: Path to the package.json file containing the packageManager field that specifies the Bun runtime version
    required: false
    default: src/Clients/package.json

runs:
  using: composite
  steps:
    - name: Setup .NET Core
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
      with:
        global-json-file: ${{ inputs.global-json-file }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.2
      with:
        bun-version-file: ${{ inputs.bun-version-file }}

    - name: Install Tools
      shell: bash
      run: dotnet tool restore

    - name: Configure Husky
      shell: bash
      if: success()
      run: dnx husky install
