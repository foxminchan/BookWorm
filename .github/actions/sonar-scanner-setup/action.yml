name: SonarQube Scanner Setup
description: Cache and install the SonarQube Cloud scanner for .NET analysis
author: BookWorm Team

branding:
  icon: shield
  color: purple

runs:
  using: composite
  steps:
    - name: Cache SonarQube Cloud packages
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Cache SonarQube Cloud scanner
      id: cache-sonar-scanner
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ./.sonar/scanner
        key: ${{ runner.os }}-sonar-scanner
        restore-keys: ${{ runner.os }}-sonar-scanner

    - name: Install SonarCloud scanner
      if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
      shell: bash
      env:
        SCANNER_PATH: ./.sonar/scanner
      run: |
        mkdir -p "${SCANNER_PATH}"
        dotnet tool update dotnet-sonarscanner --tool-path "${SCANNER_PATH}"
