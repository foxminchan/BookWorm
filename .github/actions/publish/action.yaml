name: "Publish Artifact"
description: "Build and publish BookWorm container images to GitHub Container Registry using Aspire CLI, and publish the MCP server to the MCP Registry"
author: "BookWorm Team"

branding:
  icon: "upload-cloud"
  color: "green"

inputs:
  global-json-file:
    description: "Path to the global.json file that specifies the .NET SDK version"
    required: false
    default: "./global.json"
  bun-version-file:
    description: "Path to the .bun-version file that specifies the Bun runtime version"
    required: false
    default: ".bun-version"
  repository:
    description: "Container image repository path (e.g., 'owner/repo') used as the image name prefix in the registry"
    required: false
  operations-environment:
    description: "Target operations environment for Aspire deployment commands (e.g., 'Linux', 'Windows')"
    required: false
    default: ${{ runner.os }}
  azure-subscription-id:
    description: "Azure Subscription ID used for authenticating Aspire deployment operations"
    required: true
  azure-location:
    description: "Azure region for resource deployment (e.g., 'eastus', 'westeurope')"
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: ${{ inputs.global-json-file }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: ${{ inputs.bun-version-file }}

    - name: Install Aspire CLI
      shell: bash
      run: |
        curl -sSL https://aspire.dev/install.sh | bash
        echo "$HOME/.aspire/bin" >> $GITHUB_PATH

    - name: Verify Aspire Installation
      shell: bash
      run: aspire --version

    - name: Push to GitHub Container Registry
      shell: bash
      run: aspire do push
      env:
        Azure__SubscriptionId: ${{ inputs.azure-subscription-id }}
        Azure__Location: ${{ inputs.azure-location }}
        Parameters__container_endpoint: ghcr.io
        Parameters__container_repository: ${{ inputs.repository }}

    - name: Install mcp-publisher
      shell: bash
      run: |
        curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      working-directory: ${{ github.workspace }}/src/Services/McpTools/BookWorm.McpTools

    - name: Authenticate to MCP Registry
      shell: bash
      run: ./mcp-publisher login github-oidc
      working-directory: ${{ github.workspace }}/src/Services/McpTools/BookWorm.McpTools

    - name: Set version in server.json
      if: github.ref_type == 'tag'
      shell: bash
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        jq --arg v "$VERSION" '
          .version = $v |
          .packages[0].identifier |= gsub(":[^:]+$"; ":" + $v)
        ' server.json > server.tmp && mv server.tmp server.json
      working-directory: ${{ github.workspace }}/src/Services/McpTools/BookWorm.McpTools

    - name: Publish server to MCP Registry
      if: github.ref_type == 'tag'
      shell: bash
      run: ./mcp-publisher publish
      working-directory: ${{ github.workspace }}/src/Services/McpTools/BookWorm.McpTools
