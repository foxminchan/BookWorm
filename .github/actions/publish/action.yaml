name: Publish Artifact
description: >-
  Build and publish BookWorm container images to GitHub Container Registry using
  Aspire CLI, and publish the MCP server to the MCP Registry
author: BookWorm Team

branding:
  icon: upload-cloud
  color: green

inputs:
  global-json-file:
    description: Path to the global.json file that specifies the .NET SDK version
    required: false
    default: global.json
  bun-version-file:
    description: Path to the .bun-version file that specifies the Bun runtime version
    required: false
    default: .bun-version
  repository:
    description: >-
      Container image repository path (e.g., 'owner/repo') used as the image
      name prefix in the registry
    required: false
  operations-environment:
    description: |
      Target operations environment for Aspire deployment commands
    required: false
    default: ${{ runner.os }}
  azure-subscription-id:
    description: |
      Azure Subscription ID used for authenticating Aspire deployment operations
    required: true
  azure-location:
    description: |
      Azure region for resource deployment (e.g., 'eastus', 'westeurope')
    required: true
  enable-debug-logging:
    description: |
      Enable debug-level logging for Aspire CLI commands (adds --log-level debug)
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Environment
      uses: ./.github/actions/setup
      with:
        global-json-file: ${{ inputs.global-json-file }}
        bun-version-file: ${{ inputs.bun-version-file }}

    - name: Install Aspire CLI
      shell: bash
      run: |
        curl -sSL https://aspire.dev/install.sh | bash
        echo "$HOME/.aspire/bin" >> $GITHUB_PATH

    - name: Verify Aspire Installation
      shell: bash
      run: aspire --version

    - name: Normalize repository name
      id: normalize
      shell: bash
      run: |
        echo "repository=$(echo "$INPUT_REPOSITORY" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      env:
        INPUT_REPOSITORY: ${{ inputs.repository }}

    - name: Push to GitHub Container Registry
      shell: bash
      run: |
        aspire do push ${{ inputs.enable-debug-logging == 'true' && '--log-level debug' || '' }}
      env:
        Azure__SubscriptionId: ${{ inputs.azure-subscription-id }}
        Azure__Location: ${{ inputs.azure-location }}
        Parameters__container_endpoint: ghcr.io
        Parameters__container_repository: ${{ steps.normalize.outputs.repository }}

    - name: Install mcp-publisher
      if: github.ref_type == 'tag'
      shell: bash
      run: |
        curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      working-directory: ${{ github.workspace }}/src/Services/McpTools/BookWorm.McpTools

    - name: Authenticate to MCP Registry
      if: github.ref_type == 'tag'
      shell: bash
      run: ./mcp-publisher login github-oidc
      working-directory: ${{ github.workspace }}/src/Services/McpTools/BookWorm.McpTools

    - name: Set version and package image in server.json
      if: github.ref_type == 'tag'
      shell: bash
      env:
        NORMALIZED_REPOSITORY: ${{ steps.normalize.outputs.repository }}
      run: bash "${{ github.action_path }}/scripts/set-server-json-for-tag.sh"
      working-directory: ${{ github.workspace }}/src/Services/McpTools/BookWorm.McpTools

    - name: Publish server to MCP Registry
      if: github.ref_type == 'tag'
      shell: bash
      run: ./mcp-publisher publish
      working-directory: ${{ github.workspace }}/src/Services/McpTools/BookWorm.McpTools
