name: "Format"
description: "Verify code formatting across the BookWorm repository using Husky-managed formatters for C#, TypeScript, and configuration files"
author: "BookWorm Team"

branding:
  icon: "align-left"
  color: "yellow"

inputs:
  global-json-file:
    description: "Path to the global.json file that specifies the .NET SDK version"
    required: false
    default: "./global.json"
  bun-version-file:
    description: "Path to the .bun-version file that specifies the Bun runtime version"
    required: false
    default: ".bun-version"

runs:
  using: "composite"
  steps:
    - name: Setup Environment
      uses: ./.github/actions/setup
      with:
        global-json-file: ${{ inputs.global-json-file }}
        bun-version-file: ${{ inputs.bun-version-file }}

    - name: Run Format Task
      shell: bash
      if: success()
      run: dnx husky run --name format
