name: "Build"
description: "Build the entire BookWorm solution in Release configuration, including .NET services and frontend applications"
author: "BookWorm Team"

branding:
  icon: "package"
  color: "blue"

inputs:
  global-json-file:
    description: "Path to the global.json file that specifies the .NET SDK version"
    required: false
    default: "./global.json"
  bun-version-file:
    description: "Path to the .bun-version file that specifies the Bun runtime version"
    required: false
    default: ".bun-version"

runs:
  using: "composite"
  steps:
    - name: Cache NuGet Packages
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      if: success()
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-dotnet-nuget

    - name: Setup .NET Core
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
      with:
        global-json-file: ${{ inputs.global-json-file }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version-file: ${{ inputs.bun-version-file }}

    - name: Install Tools
      shell: bash
      run: dotnet tool restore

    - name: Build
      shell: bash
      run: >
        dotnet build
        --configuration Release
        -p:SkipK6Build=true
        -p:SkipKeycloakifyBuild=true
