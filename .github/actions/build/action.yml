name: Build
description: >-
  Build the entire BookWorm solution in Release configuration, including .NET
  services and frontend applications
author: BookWorm Team

branding:
  icon: package
  color: blue

inputs:
  global-json-file:
    description: Path to the global.json file that specifies the .NET SDK version
    required: false
    default: global.json
  bun-version-file:
    description: Path to the .bun-version file that specifies the Bun runtime version
    required: false
    default: .bun-version

runs:
  using: composite
  steps:
    - name: Cache NuGet Packages
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      if: success()
      with:
        path: ~/.nuget/packages
        key: |
          ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Setup Environment
      uses: ./.github/actions/setup
      with:
        global-json-file: ${{ inputs.global-json-file }}
        bun-version-file: ${{ inputs.bun-version-file }}

    - name: Build
      shell: bash
      run: >
        dotnet build
        --configuration Release
        -p:SkipK6Build=true
        -p:SkipKeycloakifyBuild=true
