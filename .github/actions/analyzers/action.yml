name: Analyzers
description: >-
  Run static analysis checks on the BookWorm repository using Husky-managed
  analyzers to enforce code quality standards
author: BookWorm Team

branding:
  icon: search
  color: purple

inputs:
  global-json-file:
    description: Path to the global.json file that specifies the .NET SDK version
    required: false
    default: global.json
  bun-version-file:
    description: Path to the .bun-version file that specifies the Bun runtime version
    required: false
    default: .bun-version

runs:
  using: composite
  steps:
    - name: Setup Environment
      uses: ./.github/actions/setup
      with:
        global-json-file: ${{ inputs.global-json-file }}
        bun-version-file: ${{ inputs.bun-version-file }}

    - name: Restore
      shell: bash
      run: dotnet restore BookWorm.slnx

    - name: Run Analyzers Task
      shell: bash
      if: success()
      run: dnx husky run --name analyzers
