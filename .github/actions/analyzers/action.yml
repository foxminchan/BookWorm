name: "Analyzers"
description: "Run static analysis checks on the BookWorm repository using Husky-managed analyzers to enforce code quality standards"
author: "BookWorm Team"

branding:
  icon: "search"
  color: "purple"

inputs:
  global-json-file:
    description: "Path to the global.json file that specifies the .NET SDK version"
    required: false
    default: "./global.json"
  bun-version-file:
    description: "Path to the .bun-version file that specifies the Bun runtime version"
    required: false
    default: ".bun-version"

runs:
  using: "composite"
  steps:
    - name: Setup .NET Core
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
      with:
        global-json-file: ${{ inputs.global-json-file }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version-file: ${{ inputs.bun-version-file }}

    - name: Install Tools
      shell: bash
      run: dotnet tool restore

    - name: Restore
      shell: bash
      run: dotnet restore BookWorm.slnx

    - name: Configure Husky
      shell: bash
      if: success()
      run: dnx husky install

    - name: Run Analyzers Task
      shell: bash
      if: success()
      run: dnx husky run --name analyzers
