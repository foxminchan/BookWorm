name: "Test"
description: "Execute tests and collect coverage"
author: "BookWorm Team"

inputs:
  global-json-file:
    description: "The path to the global.json file"
    required: false
    default: "./global.json"
  bun-version-file:
    description: "The path to the .bun-version file"
    required: false
    default: ".bun-version"
  testHangTimeout:
    description: "The timeout for the test"
    required: false
    default: "7m"
  testSessionTimeout:
    description: "The timeout for the test session"
    required: false
    default: "15m"

runs:
  using: "composite"
  steps:
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: ${{ inputs.global-json-file }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: ${{ inputs.bun-version-file }}

    - name: Install Tools
      shell: bash
      run: dotnet tool restore

    - name: Expose GitHub Actions Runtime
      uses: actions/github-script@v8
      with:
        script: |
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
          core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

    - name: Test
      shell: bash
      if: success()
      env:
        TEST_HANG_TIMEOUT: ${{ inputs.testHangTimeout }}
        TEST_SESSION_TIMEOUT: ${{ inputs.testSessionTimeout }}
      run: >
        dotnet test
        --configuration Release
        --report-trx
        --coverage
        --coverage-settings Coverage.runsettings
        --results-directory ./test-results
        --github-reporter-style full
        --hangdump --hangdump-timeout "$TEST_HANG_TIMEOUT"
        --crashdump
        --timeout "$TEST_SESSION_TIMEOUT"
