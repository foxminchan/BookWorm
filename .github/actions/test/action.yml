name: "Test"
description: "Execute the full BookWorm test suite (unit, contract, integration) in Release configuration with TRX reporting, code coverage collection, and hang/crash dump diagnostics"
author: "BookWorm Team"

branding:
  icon: "check-circle"
  color: "green"

inputs:
  global-json-file:
    description: "Path to the global.json file that specifies the .NET SDK version"
    required: false
    default: "./global.json"
  bun-version-file:
    description: "Path to the .bun-version file that specifies the Bun runtime version"
    required: false
    default: ".bun-version"
  testHangTimeout:
    description: "Maximum duration to wait before generating a hang dump for an unresponsive test (e.g., '7m', '10m')"
    required: false
    default: "7m"
  testSessionTimeout:
    description: "Maximum total duration for the entire test session before forceful termination (e.g., '15m', '30m')"
    required: false
    default: "15m"

runs:
  using: "composite"
  steps:
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: ${{ inputs.global-json-file }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: ${{ inputs.bun-version-file }}

    - name: Install Tools
      shell: bash
      run: dotnet tool restore

    - name: Expose GitHub Actions Runtime
      uses: actions/github-script@v8
      with:
        script: |
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
          core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

    - name: Test
      shell: bash
      if: success()
      env:
        TEST_HANG_TIMEOUT: ${{ inputs.testHangTimeout }}
        TEST_SESSION_TIMEOUT: ${{ inputs.testSessionTimeout }}
      run: >
        dotnet test
        --configuration Release
        --report-trx
        --coverage
        --coverage-settings Coverage.runsettings
        --results-directory ./test-results
        --github-reporter-style full
        --hangdump --hangdump-timeout "$TEST_HANG_TIMEOUT"
        --crashdump
        --timeout "$TEST_SESSION_TIMEOUT"
