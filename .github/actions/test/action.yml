name: Test
description: >-
  Execute the full BookWorm test suite (unit, contract, integration) in Release
  configuration with TRX reporting, code coverage collection, and hang/crash
  dump diagnostics
author: BookWorm Team

branding:
  icon: check-circle
  color: green

inputs:
  global-json-file:
    description: Path to the global.json file that specifies the .NET SDK version
    required: false
    default: ./global.json
  bun-version-file:
    description: Path to the .bun-version file that specifies the Bun runtime version
    required: false
    default: .bun-version
  testHangTimeout:
    description: >-
      Maximum duration to wait before generating a hang dump for an unresponsive
      test (e.g., '7m', '10m')
    required: false
    default: "7m"
  testSessionTimeout:
    description: >-
      Maximum total duration for the entire test session before forceful
      termination (e.g., '15m', '30m')
    required: false
    default: "15m"
  no-build:
    description: >-
      Skip building before testing (requires pre-built artifacts in
      artifacts/bin/)
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Cache NuGet Packages
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.nuget/packages
        key: |
          ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Setup Environment
      uses: ./.github/actions/setup
      with:
        global-json-file: ${{ inputs.global-json-file }}
        bun-version-file: ${{ inputs.bun-version-file }}

    - name: Restore dependencies
      shell: bash
      run: dotnet restore BookWorm.slnx

    - name: Expose GitHub Actions Runtime
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: |
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
          core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

    - name: Test
      shell: bash
      if: success()
      env:
        TEST_HANG_TIMEOUT: ${{ inputs.testHangTimeout }}
        TEST_SESSION_TIMEOUT: ${{ inputs.testSessionTimeout }}
        NO_BUILD: ${{ inputs.no-build }}
      run: >
        dotnet test
        --configuration Release
        --no-restore
        $( [[ "$NO_BUILD" == "true" ]] && echo "--no-build" )
        --report-trx
        --coverage
        --coverage-settings Coverage.runsettings
        --results-directory ./test-results
        --github-reporter-style full
        --hangdump --hangdump-timeout "$TEST_HANG_TIMEOUT"
        --crashdump
        --timeout "$TEST_SESSION_TIMEOUT"
