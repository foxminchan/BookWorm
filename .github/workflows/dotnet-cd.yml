name: BookWorm CD (.NET)
run-name: .NET CD - ${{ github.event_name }} by ${{ github.actor }}

on:
  workflow_run:
    workflows: ["BookWorm CI (.NET)"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "The environment to deploy to"
        required: true
        type: environment
      storefront_url:
        description: "The Storefront application URL for CORS (e.g., https://storefront.bookworm.com)"
        required: true
        type: string
      backoffice_url:
        description: "The Backoffice application URL for CORS (e.g., https://backoffice.bookworm.com)"
        required: true
        type: string

env:
  GLOBAL_JSON_PATH: ${{ github.workspace }}/global.json

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  aspire_deploy:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    name: Deploy BookWorm to ACA from GHCR
    permissions:
      id-token: write
      contents: read
      packages: read
    environment: ${{ github.event.inputs.environment || 'development' }}
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup .NET Core
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH

      - name: Verify Aspire Installation
        run: aspire --version

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Normalize repository name
        id: normalize
        run: echo "repository=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Deploy with Aspire
        run: |
          aspire deploy \
            --environment ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'development' }}
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
          DOTNET_NOLOGO: true
          DOTNET_GENERATE_ASPNET_CERTIFICATE: false
          DOTNET_ADD_GLOBAL_TOOLS_TO_PATH: false
          DOTNET_MULTILEVEL_LOOKUP: 0
          DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: true
          Azure__SubscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          Azure__Location: ${{ secrets.AZURE_LOCATION || 'southeastasia' }}
          Parameters__container_endpoint: ghcr.io
          Parameters__container_repository: ${{ steps.normalize.outputs.repository }}
          Parameters__openai_openai_apikey: ${{ secrets.OPENAI_APIKEY }}
          Parameters__kc_url: ${{ secrets.KC_URL }}
          Parameters__kc_realm: ${{ secrets.KC_REALM }}
          Parameters__catalog_secret: ${{ secrets.CATALOG_SECRET }}
          Parameters__basket_secret: ${{ secrets.BASKET_SECRET }}
          Parameters__ordering_secret: ${{ secrets.ORDERING_SECRET }}
          Parameters__chatting_secret: ${{ secrets.CHATTING_SECRET }}
          Parameters__rating_secret: ${{ secrets.RATING_SECRET }}
          Parameters__sendgrid_api_key: ${{ secrets.SENDGRID_API_KEY }}
          Parameters__sendgrid_email: ${{ secrets.SENDGRID_EMAIL }}
          Parameters__sendgrid_sender_name: ${{ secrets.SENDGRID_SENDER_NAME }}
          Parameters__storefront_url: ${{ github.event.inputs.storefront_url || secrets.STOREFRONT_URL || '' }}
          Parameters__backoffice_url: ${{ github.event.inputs.backoffice_url || secrets.BACKOFFICE_URL || '' }}
