name: BookWorm CI (Frontend)
run-name: Frontend CI - ${{ github.event_name }} by ${{ github.actor }}

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/frontend-ci.yml
      - .github/workflows/frontend-shared.yml
      - src/Clients/**
      - "!**.md"
  workflow_dispatch:
    inputs:
      environment:
        description: The environment to deploy to
        required: true
        type: environment
      publish:
        description: Whether to build and push Docker images
        type: boolean
        required: true
        default: true

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  ci:
    name: 🎨 Frontend CI Pipeline
    uses: ./.github/workflows/frontend-shared.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
    secrets:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

  publish:
    name: 🐳 Docker Build, Push & Attest
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.publish ==
      'true'
    needs:
      - ci
    timeout-minutes: 20
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'development' }}
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - app: storefront
            package: "@bookworm/storefront"
            image: bookworm/storefront
          - app: backoffice
            package: "@bookworm/backoffice"
            image: bookworm/backoffice

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: 📥 Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🔨 Build and push ${{ matrix.app }}
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: src/Clients
          file: src/Clients/apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          build-args: |
            TURBO_TEAM=${{ env.TURBO_TEAM }}
          secrets: |
            TURBO_TOKEN=${{ env.TURBO_TOKEN }}

      - name: 📝 Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: 📣 Trigger container security scan
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.1.0
        with:
          event-type: frontend-container-images-published
