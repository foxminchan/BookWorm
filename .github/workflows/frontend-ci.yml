name: BookWorm CI (Frontend)
run-name: Frontend CI - ${{ github.event_name }} by ${{ github.actor }}

on:
  push:
    branches: [main]
    paths:
      - "src/Clients/**"
      - ".github/workflows/frontend-ci.yml"
      - "!**.md"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/Clients/**"
      - ".github/workflows/frontend-ci.yml"
      - "!**.md"
  workflow_dispatch:

env:
  RETENTION_DAYS: ${{ github.event_name == 'pull_request' && 1 || 7 }}

permissions:
  checks: write
  pull-requests: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    name: Lint, Build & Test
    timeout-minutes: 15
    runs-on: ubuntu-latest

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    defaults:
      run:
        working-directory: src/Clients

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          package_json_file: src/Clients/package.json

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: "src/Clients/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: "src/Clients/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Generate Allure Reports
        if: always()
        run: pnpm turbo allure:generate --continue

      - name: Upload Allure Report (Backoffice)
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: allure-report-backoffice
          path: src/Clients/apps/backoffice/allure-report/
          retention-days: ${{ env.RETENTION_DAYS }}

      - name: Upload Allure Report (Storefront)
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: allure-report-storefront
          path: src/Clients/apps/storefront/allure-report/
          retention-days: ${{ env.RETENTION_DAYS }}

      - name: Post Allure Summary (Backoffice)
        uses: allure-framework/allure-action@c24234151c027cfee99e00eb6ec2dac1eb350414 # v0
        with:
          report-directory: src/Clients/apps/backoffice/allure-report
          github-token: ${{ github.token }}

      - name: Post Allure Summary (Storefront)
        uses: allure-framework/allure-action@c24234151c027cfee99e00eb6ec2dac1eb350414 # v0
        with:
          report-directory: src/Clients/apps/storefront/allure-report
          github-token: ${{ github.token }}
