name: BookWorm Pull Request Validation
run-name: PR #${{ github.event.pull_request.number }} - ${{ github.actor }}

on:
  pull_request:
    paths:
      # Source & test code
      - "src/**"
      - "tests/**"
      # CI/CD configuration
      - ".github/actions/**"
      - ".github/workflows/dotnet-shared.yml"
      - ".github/workflows/frontend-shared.yml"
      - ".github/workflows/pr-validation.yml"
      # Build configuration
      - ".config/dotnet-tools.json"
      - "BookWorm.slnx"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "global.json"
      - "Versions.props"
      # Exclusions (last-match-wins, must follow includes)
      - "!**.md"
      - "!src/Aspire/BookWorm.AppHost/Container/**"
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      dotnet: ${{ steps.detect.outputs.dotnet }}
      frontend: ${{ steps.detect.outputs.frontend }}
    steps:
      - name: Detect changed paths
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANGED=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --paginate --jq '.[].filename')
          dotnet=false
          frontend=false

          while IFS= read -r file; do
            case "$file" in
              src/Clients/*) frontend=true ;;
              src/*|tests/*|Directory.*|global.json|Versions.props|.config/*|BookWorm.slnx|.github/actions/*) dotnet=true ;;
            esac
          done <<< "$CHANGED"

          echo "dotnet=$dotnet" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"

  dotnet:
    name: .NET CI
    needs: changes
    if: needs.changes.outputs.dotnet == 'true'
    uses: ./.github/workflows/dotnet-shared.yml
    permissions:
      contents: read
      security-events: write
      pull-requests: write
      checks: write
    secrets: inherit

  frontend:
    name: Frontend CI
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    uses: ./.github/workflows/frontend-shared.yml
    with:
      retention-days: 1
    permissions:
      contents: read
      checks: write
      pull-requests: write
    secrets: inherit

  status:
    name: PR Status
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [changes, dotnet, frontend]
    if: ${{ !cancelled() }}
    permissions: {}
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.dotnet.result }}" == "failure" || "${{ needs.frontend.result }}" == "failure" ]]; then
            echo "::error::One or more CI pipelines failed"
            exit 1
          fi
          echo "All CI pipelines passed or were skipped"
