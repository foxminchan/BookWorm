name: BookWorm Pull Request Validation
run-name: "PR #${{ github.event.pull_request.number }} - ${{ github.actor }}"

on:
  pull_request:
    paths:
      # Source & test code
      - "src/**"
      - "tests/**"
      # CI/CD configuration
      - ".github/actions/**"
      - ".github/workflows/**"
      # Build configuration
      - ".config/dotnet-tools.json"
      - "BookWorm.slnx"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "global.json"
      - "Versions.props"
      # Exclusions (last-match-wins, must follow includes)
      - "!**.md"
      - "!src/Aspire/BookWorm.AppHost/Container/**"
    types:
      - opened
      - synchronize
      - reopened

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend }}
    steps:
      - name: Detect changed paths
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANGED=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --paginate --jq '.[].filename')
          backend=false
          frontend=false

          while IFS= read -r file; do
            case "$file" in
              src/Clients/*) frontend=true ;;
              .github/workflows/*|.github/actions/*) backend=true; frontend=true ;;
              src/*|tests/*|Directory.*|global.json|Versions.props|.config/*|BookWorm.slnx) backend=true ;;
            esac
          done <<< "$CHANGED"

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"

  backend:
    name: Backend CI
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/backend-shared.yml
    permissions:
      contents: read
      security-events: write
      pull-requests: write
      checks: write

  frontend:
    name: Frontend CI
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    uses: ./.github/workflows/frontend-shared.yml
    with:
      retention-days: 1
    permissions:
      contents: read
      checks: write
      pull-requests: write
    secrets:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          warn-only: false

  status:
    name: PR Status
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [changes, backend, frontend, dependency-review]
    if: ${{ !cancelled() }}
    permissions: {}
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.backend.result }}" == "failure" || "${{ needs.frontend.result }}" == "failure" || "${{ needs.dependency-review.result }}" == "failure" ]]; then
            echo "::error::One or more CI pipelines failed"
            exit 1
          fi
          echo "All CI pipelines passed or were skipped"
