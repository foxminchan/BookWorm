name: BookWorm Pull Request Validation
run-name: "PR #${{ github.event.pull_request.number }} - ${{ github.actor }}"

on:
  pull_request:
    paths:
      # Source & test code
      - src/**
      - tests/**
      # CI/CD configuration
      - .github/actions/**
      - .github/workflows/**
      # Build configuration
      - .config/dotnet-tools.json
      - BookWorm.slnx
      - Directory.Build.props
      - Directory.Packages.props
      - global.json
      - Versions.props
      # Exclusions (last-match-wins, must follow includes)
      - "!**.md"
      - "!src/Aspire/BookWorm.AppHost/Container/**"
    types:
      - opened
      - synchronize
      - reopened

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend }}
    steps:
      - name: 🔍 Detect changed paths
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CHANGED=$(gh api repos/$REPOSITORY/pulls/$PR_NUMBER/files --paginate --jq '.[].filename')
          backend=false
          frontend=false

          while IFS= read -r file; do
            case "$file" in
              src/Clients/*) frontend=true ;;
              .github/workflows/*|.github/actions/*) backend=true; frontend=true ;;
              src/*|tests/*|Directory.*|global.json|Versions.props|.config/*|BookWorm.slnx) backend=true ;;
            esac
          done <<< "$CHANGED"

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"

  backend:
    name: ⚙️ Backend CI
    needs:
      - changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/backend-shared.yml
    permissions:
      contents: read
      security-events: write
      pull-requests: write
      checks: write

  frontend:
    name: 🎨 Frontend CI
    needs:
      - changes
    if: needs.changes.outputs.frontend == 'true'
    uses: ./.github/workflows/frontend-shared.yml
    with:
      retention-days: 1
    permissions:
      contents: read
      checks: write
      pull-requests: write
    secrets:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

  dependency-review:
    name: 🔒 Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🔍 Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          config-file: "./.github/dependency-review-config.yml"

  status:
    name: ✅ PR Status
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - changes
      - backend
      - frontend
      - dependency-review
    if: ${{ !cancelled() }}
    permissions: {}
    steps:
      - name: ✅ Check results
        env:
          BACKEND: ${{ needs.backend.result }}
          FRONTEND: ${{ needs.frontend.result }}
          DEPENDENCY_REVIEW: ${{ needs.dependency-review.result }}
        run: |
          if [[ "$BACKEND" == "failure" || "$FRONTEND" == "failure" || "$DEPENDENCY_REVIEW" == "failure" ]]; then
            echo "::error::One or more CI pipelines failed"
            exit 1
          fi
          echo "All CI pipelines passed or were skipped"
