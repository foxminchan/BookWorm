name: BookWorm CD (Backend)
run-name: Backend CD - ${{ github.event_name }} by ${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: The environment to deploy to
        required: true
        type: environment
      storefront_url:
        description: The Storefront application URL for CORS
        required: true
        type: string
      backoffice_url:
        description: The Backoffice application URL for CORS
        required: true
        type: string

env:
  GLOBAL_JSON_PATH: global.json
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  aspire_deploy:
    runs-on: ubuntu-latest
    name: 🚀 Deploy BookWorm to ACA from GHCR
    permissions:
      id-token: write
      contents: read
      packages: read
    environment: ${{ github.event.inputs.environment }}
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: 🔧 Setup .NET Core
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}

      - name: 🔍 Resolve Aspire version
        id: aspire-version
        run: |
          ASPIRE_VERSION="$(dotnet msbuild Versions.props -nologo -v:q -getProperty:AspireVersion)"
          echo "version=${ASPIRE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "cli-version=${ASPIRE_VERSION%%-*}" >> "$GITHUB_OUTPUT"

      - name: 🛠️ Install Aspire CLI
        uses: timheuer/setup-aspire@fec3fa825218461aa07fed28fa97a600d5d88b14 # v0.1.0
        with:
          version: ${{ steps.aspire-version.outputs.version }}

      - name: ✅ Verify Aspire CLI version
        env:
          EXPECTED_ASPIRE_CLI_VERSION: ${{ steps.aspire-version.outputs.cli-version }}
        run: |
          INSTALLED_ASPIRE_CLI_VERSION="$(aspire --version)"
          case "${INSTALLED_ASPIRE_CLI_VERSION}" in
            "${EXPECTED_ASPIRE_CLI_VERSION}"|"${EXPECTED_ASPIRE_CLI_VERSION}"+*) ;;
            *)
              echo "Expected Aspire CLI version ${EXPECTED_ASPIRE_CLI_VERSION}, but found ${INSTALLED_ASPIRE_CLI_VERSION}."
              exit 1
              ;;
          esac

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: 🔐 Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 🔤 Normalize repository name
        id: normalize
        run: |
          echo "repository=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: 🚀 Deploy with Aspire
        run: |
          aspire deploy \
            --environment ${{ github.event.inputs.environment }}
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
          DOTNET_NOLOGO: true
          DOTNET_GENERATE_ASPNET_CERTIFICATE: false
          DOTNET_ADD_GLOBAL_TOOLS_TO_PATH: false
          DOTNET_MULTILEVEL_LOOKUP: 0
          DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: true
          Azure__SubscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          Azure__Location: ${{ secrets.AZURE_LOCATION || 'southeastasia' }}
          Parameters__container_endpoint: ghcr.io
          Parameters__container_repository: ${{ steps.normalize.outputs.repository }}
          Parameters__openai_openai_apikey: ${{ secrets.OPENAI_APIKEY }}
          Parameters__kc_url: ${{ secrets.KC_URL }}
          Parameters__kc_realm: ${{ secrets.KC_REALM }}
          Parameters__catalog_secret: ${{ secrets.CATALOG_SECRET }}
          Parameters__basket_secret: ${{ secrets.BASKET_SECRET }}
          Parameters__ordering_secret: ${{ secrets.ORDERING_SECRET }}
          Parameters__chatting_secret: ${{ secrets.CHATTING_SECRET }}
          Parameters__rating_secret: ${{ secrets.RATING_SECRET }}
          Parameters__sendgrid_api_key: ${{ secrets.SENDGRID_API_KEY }}
          Parameters__sendgrid_email: ${{ secrets.SENDGRID_EMAIL }}
          Parameters__sendgrid_sender_name: ${{ secrets.SENDGRID_SENDER_NAME }}
          Parameters__storefront_url: ${{ github.event.inputs.storefront_url }}
          Parameters__backoffice_url: ${{ github.event.inputs.backoffice_url }}
