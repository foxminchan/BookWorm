name: Copilot Setup Steps
run-name: Run Copilot Setup Steps

# Allow testing of the setup steps from your repository's "Actions" tab.
on: workflow_dispatch

permissions: {}

env:
  GLOBAL_JSON_PATH: global.json
  BUN_VERSION_FILE: .bun-version
  MISE_EXPERIMENTAL: true

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # If you want to clone the repository as part of your setup steps, for example to install dependencies, you'll need the `contents: read` permission. If you don't clone the repository in your setup steps, Copilot will do this for you automatically after the steps complete.
      contents: read

    # You can define any steps you want, and they will run before the agent starts.
    # If you do not check out your code, Copilot will do this for you.
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: 🔧 Setup .NET Core
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.2
        with:
          bun-version-file: ${{ env.BUN_VERSION_FILE }}

      - name: ⚡ Setup Mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - name: 🐳 Setup Docker
        uses: docker/setup-docker-action@0234bb73ccb40f0c430b795634f9247e2b5c2d23 # v5.2.0

      - name: 🛠️ Install Tools
        run: dotnet tool restore

      - name: 🔧 Make agent hook scripts executable
        run: chmod +x .github/hooks/scripts/bash/*.sh

      - name: 🔨 Build
        run: dotnet build --configuration Debug

      - name: 📦 Install docusaurus dependencies
        run: bun install --frozen-lockfile --ignore-scripts
        working-directory: docs/docusaurus

      - name: 📦 Install eventcatalog dependencies
        run: bun install --frozen-lockfile --ignore-scripts
        working-directory: docs/eventcatalog

      - name: 📦 Install frontend dependencies
        run: bun install --frozen-lockfile --ignore-scripts
        working-directory: src/Clients
