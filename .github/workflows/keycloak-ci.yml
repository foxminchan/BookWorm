name: BookWorm CI (Keycloakify)
run-name: Keycloakify CI - ${{ github.event_name }} by ${{ github.actor }}

on:
  push:
    branches:
      - main
    paths:
      - src/Aspire/BookWorm.AppHost/Container/keycloak/keycloakify/**
      - .github/workflows/keycloak-ci.yml
  pull_request:
    branches:
      - main
    paths:
      - src/Aspire/BookWorm.AppHost/Container/keycloak/keycloakify/**
      - .github/workflows/keycloak-ci.yml
  workflow_dispatch:
    inputs:
      environment:
        description: The environment to deploy to
        required: true
        type: environment

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "25"
  BUN_VERSION_FILE: .bun-version
  KEYCLOAK_DIR: src/Aspire/BookWorm.AppHost/Container/keycloak
  KEYCLOAKIFY_DIR: src/Aspire/BookWorm.AppHost/Container/keycloak/keycloakify

jobs:
  build:
    name: Build Keycloak Theme
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: >-
      ${{ github.event_name == 'workflow_dispatch' &&
          github.event.inputs.environment || 'development' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.0.0
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Verify Maven installation
        run: |
          mvn --version
          java -version

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.2
        with:
          bun-version-file: ${{ env.BUN_VERSION_FILE }}

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: |
            ${{ runner.os }}-bun-keycloakify-${{ hashFiles('src/Aspire/BookWorm.AppHost/Container/keycloak/keycloakify/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-keycloakify-

      - name: Install dependencies
        working-directory: ${{ env.KEYCLOAKIFY_DIR }}
        run: bun install --frozen-lockfile

      - name: Run CI checks
        working-directory: ${{ env.KEYCLOAKIFY_DIR }}
        run: bun run ci

      - name: Build Keycloak theme
        working-directory: ${{ env.KEYCLOAKIFY_DIR }}
        run: bun run build-keycloak-theme

      - name: List generated files
        working-directory: ${{ env.KEYCLOAK_DIR }}
        run: |
          echo "=== Generated theme files ==="
          find themes -name "*.jar" -type f || echo "No JAR files found"
          ls -R themes/ || echo "themes directory not found"

      - name: Get theme version
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: theme-version
        working-directory: ${{ env.KEYCLOAKIFY_DIR }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Theme version: $VERSION"

      - name: Prepare JAR artifacts
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ env.KEYCLOAK_DIR }}
        run: |
          mkdir -p jar-artifacts
          # Find and copy all JAR files from themes directory
          find themes -name "*.jar" -type f -exec cp {} jar-artifacts/ \;
          echo "=== JAR files ready for upload ==="
          ls -lah jar-artifacts/

      - name: Upload JAR artifacts
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: |
            bookworm-keycloak-theme-v${{ steps.theme-version.outputs.version || 'latest' }}
          path: src/Aspire/BookWorm.AppHost/Container/keycloak/jar-artifacts/*.jar
          retention-days: 90
          if-no-files-found: error
