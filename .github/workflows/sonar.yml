name: SonarQube Analysis
run-name: SonarQube Analysis - ${{ github.actor }} (${{ github.ref_name }})

on:
  push:
    branches:
      - main
    paths:
      # Source & test code
      - "src/**"
      - "tests/**"
      # CI/CD configuration
      - ".github/workflows/sonar.yml"
      # SonarQube configuration
      - ".sonarlint/**"
      - "SonarQube.Analysis.xml"
      # Exclusions (last-match-wins, must follow includes)
      - "!src/Aspire/BookWorm.AppHost/Container/**"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/sonar.yml"
      - ".sonarlint/**"
      - "SonarQube.Analysis.xml"
      - "!src/Aspire/BookWorm.AppHost/Container/**"
      - "!**.md"
    types:
      - opened
      - synchronize
      - reopened

permissions: {}

env:
  JAVA_VERSION: "25"
  GLOBAL_JSON_PATH: ${{ github.workspace }}/global.json
  BUN_VERSION_FILE: ${{ github.workspace }}/.bun-version
  HANG_TIMEOUT: "7m"
  SESSION_TIMEOUT: "15m"

jobs:
  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Frontend
        uses: ./.github/actions/frontend-setup
        with:
          bun-version-file: ${{ env.BUN_VERSION_FILE }}

      - name: Frontend test with coverage
        working-directory: src/Clients
        run: pnpm turbo run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-coverage
          path: |
            src/Clients/apps/storefront/coverage/lcov.info
            src/Clients/apps/backoffice/coverage/lcov.info
          retention-days: 1
          if-no-files-found: warn

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Security Scan
        uses: ./.github/actions/security-scan

  analyze:
    name: Build and analyze
    needs: [frontend-test, security-scan]
    if: ${{ !cancelled() && needs.security-scan.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.0.0
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup .NET Core
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}

      - name: Cache NuGet Packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Download frontend coverage
        if: needs.frontend-test.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-coverage
          path: ${{ github.workspace }}/src/Clients/apps

      - name: Setup SonarQube Scanner
        uses: ./.github/actions/sonar-scanner-setup

      - name: Sonarqube Begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          .sonar/scanner/dotnet-sonarscanner begin
          /k:"foxminchan_BookWorm"
          /o:"foxminchan"
          /d:sonar.token="$SONAR_TOKEN"
          /s:$GITHUB_WORKSPACE/SonarQube.Analysis.xml

      - name: Build
        run: >
          dotnet build
          --configuration Release
          --no-incremental
          -p:SkipK6Build=true
          -p:SkipKeycloakifyBuild=true

      - name: Test
        run: >
          dotnet test
          --configuration Release
          --report-trx
          --coverage
          --coverage-settings Coverage.runsettings
          --results-directory ./test-results
          --github-reporter-style full
          --hangdump --hangdump-timeout ${{ env.HANG_TIMEOUT }}
          --crashdump
          --timeout ${{ env.SESSION_TIMEOUT }}

      - name: Sonarqube End
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          .sonar/scanner/dotnet-sonarscanner end
          /d:sonar.token="$SONAR_TOKEN"
