name: SonarQube Analysis
run-name: SonarQube Analysis - ${{ github.actor }} (${{ github.ref_name }})

on:
  push:
    branches:
      - main
    paths:
      # Source & test code
      - src/**
      - tests/**
      # CI/CD configuration
      - .github/workflows/sonar.yml
      # SonarQube configuration
      - .sonarlint/**
      - SonarQube.Analysis.xml
      # Exclusions (last-match-wins, must follow includes)
      - "!src/Aspire/BookWorm.AppHost/Container/**"
  pull_request:
    paths:
      - src/**
      - tests/**
      - .github/workflows/sonar.yml
      - .sonarlint/**
      - SonarQube.Analysis.xml
      - "!src/Aspire/BookWorm.AppHost/Container/**"
      - "!**.md"
    types:
      - opened
      - synchronize
      - reopened

permissions: {}

env:
  JAVA_VERSION: "25"
  GLOBAL_JSON_PATH: global.json
  BUN_VERSION_FILE: .bun-version
  HANG_TIMEOUT: 7m
  SESSION_TIMEOUT: 15m

jobs:
  frontend-test:
    name: 🧪 Frontend tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🎨 Setup Frontend
        uses: ./.github/actions/frontend-setup
        with:
          bun-version-file: ${{ env.BUN_VERSION_FILE }}

      - name: 🧪 Frontend test with coverage
        working-directory: src/Clients
        run: ./node_modules/.bin/turbo run test:coverage

      - name: ⬆️ Upload frontend coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-coverage
          path: |
            src/Clients/apps/storefront/coverage/lcov.info
            src/Clients/apps/backoffice/coverage/lcov.info
          retention-days: 1
          if-no-files-found: warn

  analyze:
    name: 🔍 Build and analyze
    needs:
      - frontend-test
    if: ${{ !cancelled() && needs.frontend-test.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_NOLOGO: true
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: ☕ Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.0.0
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🔧 Setup .NET Core
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}

      - name: 💾 Cache NuGet Packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: |
            ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: ⬇️ Download frontend coverage
        if: needs.frontend-test.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-coverage
          path: ${{ github.workspace }}/src/Clients/apps

      - name: 🔍 Setup SonarQube Scanner
        uses: ./.github/actions/sonar-scanner-setup

      - name: 🔍 Sonarqube Begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          .sonar/scanner/dotnet-sonarscanner begin
          /k:"foxminchan_BookWorm"
          /o:"foxminchan"
          /d:sonar.token="$SONAR_TOKEN"
          /s:$GITHUB_WORKSPACE/SonarQube.Analysis.xml

      - name: 🔨 Build
        run: >
          dotnet build
          --configuration Release
          --no-incremental
          -p:SkipK6Build=true -p:SkipKeycloakifyBuild=true

      - name: 🤖 Start AIMock server
        uses: CopilotKit/aimock@27695ee7adc31a62524ce4ff3f59bd29874643af # v1.31.0
        id: aimock
        with:
          config: tests/BookWorm.AI.Evaluation/aimock.json

      - name: 🧪 Test
        env:
          OPENAI_BASE_URL: ${{ steps.aimock.outputs.url }}/v1
          OPENAI_API_KEY: test
        run: >
          dotnet test
          --configuration Release
          --report-trx
          --coverage
          --coverage-settings Coverage.runsettings
          --results-directory ./test-results
          --github-reporter-style full
          --hangdump
          --hangdump-timeout ${{ env.HANG_TIMEOUT }}
          --crashdump
          --timeout ${{ env.SESSION_TIMEOUT }}

      - name: 🔍 Sonarqube End
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          .sonar/scanner/dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"
