name: SonarQube Analysis
run-name: SonarQube Analysis - ${{ github.actor }} (${{ github.ref_name }})

on:
  push:
    branches:
      - main
    paths:
      # Source & test code
      - "src/**"
      - "tests/**"
      # CI/CD configuration
      - ".github/workflows/sonar.yml"
      # SonarQube configuration
      - ".sonarlint/**"
      - "SonarQube.Analysis.xml"
      # Exclusions (last-match-wins, must follow includes)
      - "!src/Aspire/BookWorm.AppHost/Container/**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions: {}

env:
  JAVA_VERSION: "25"
  GLOBAL_JSON_PATH: ${{ github.workspace }}/global.json
  BUN_VERSION_FILE: ${{ github.workspace }}/.bun-version
  HANG_TIMEOUT: "7m"
  SESSION_TIMEOUT: "15m"

jobs:
  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.2
        with:
          bun-version-file: ${{ env.BUN_VERSION_FILE }}

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          package_json_file: src/Clients/package.json

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.0.0
        with:
          node-version-file: "src/Clients/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: "src/Clients/pnpm-lock.yaml"

      - name: Install frontend dependencies
        working-directory: src/Clients
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Frontend test with coverage
        working-directory: src/Clients
        run: pnpm turbo run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-coverage
          path: |
            src/Clients/apps/storefront/coverage/lcov.info
            src/Clients/apps/backoffice/coverage/lcov.info
          retention-days: 1
          if-no-files-found: warn

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Security Scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_CONFIG: .gitleaks.toml

  analyze:
    name: Build and analyze
    needs: [frontend-test, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.0.0
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup .NET Core
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.0.0
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}

      - name: Download frontend coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          name: frontend-coverage
          path: src/Clients/apps

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.0
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p .sonar/scanner
          dotnet tool update dotnet-sonarscanner --tool-path .sonar/scanner

      - name: Sonarqube Begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          .sonar/scanner/dotnet-sonarscanner begin
          /k:"foxminchan_BookWorm"
          /o:"foxminchan"
          /d:sonar.token="$SONAR_TOKEN"
          /s:$GITHUB_WORKSPACE/SonarQube.Analysis.xml

      - name: Build
        run: >
          dotnet build
          --configuration Release
          --no-incremental
          -p:SkipK6Build=true
          -p:SkipKeycloakifyBuild=true

      - name: Test
        run: >
          dotnet test
          --configuration Release
          --report-trx
          --coverage
          --coverage-settings Coverage.runsettings
          --results-directory ./test-results
          --github-reporter-style full
          --hangdump --hangdump-timeout ${{ env.HANG_TIMEOUT }}
          --crashdump
          --timeout ${{ env.SESSION_TIMEOUT }}

      - name: Sonarqube End
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          .sonar/scanner/dotnet-sonarscanner end
          /d:sonar.token="$SONAR_TOKEN"
