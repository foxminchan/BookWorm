name: BookWorm CI (.NET)
run-name: .NET CI - ${{ github.event_name }} by ${{ github.actor }}

on:
  push:
    branches: [main]
    paths:
      # Source & test code
      - "src/**"
      - "tests/**"
      # CI/CD configuration
      - ".github/actions/**"
      - ".github/workflows/dotnet-ci.yml"
      - ".github/workflows/dotnet-shared.yml"
      # Build configuration
      - ".config/dotnet-tools.json"
      - "BookWorm.slnx"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "global.json"
      - "Versions.props"
      # Exclusions (last-match-wins, must follow includes)
      - "!**.md"
      - "!src/Aspire/BookWorm.AppHost/Container/**"
      - "!src/Clients/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "The environment to deploy to"
        required: true
        type: environment
      publish:
        description: "Whether to publish the artifacts"
        type: boolean
        required: true
        default: true

env:
  GLOBAL_JSON_PATH: ${{ github.workspace }}/global.json
  BUN_VERSION_FILE: ${{ github.workspace }}/.bun-version

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI Pipeline
    uses: ./.github/workflows/dotnet-shared.yml
    permissions:
      contents: read
      security-events: write
      pull-requests: write
      checks: write

  publish:
    name: Publish Artifacts
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'development' }}
    timeout-minutes: 15
    needs: [ci]
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Validate required secrets
        run: |
          missing=()
          [[ -z "$AZURE_CLIENT_ID" ]] && missing+=("AZURE_CLIENT_ID")
          [[ -z "$AZURE_TENANT_ID" ]] && missing+=("AZURE_TENANT_ID")
          [[ -z "$AZURE_SUBSCRIPTION_ID" ]] && missing+=("AZURE_SUBSCRIPTION_ID")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Publish Service
        uses: ./.github/actions/publish
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}
          bun-version-file: ${{ env.BUN_VERSION_FILE }}
          repository: ${{ github.repository }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure-location: ${{ secrets.AZURE_LOCATION || 'southeastasia' }}

      - name: Trigger container security scan
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.1.0
        with:
          event-type: backend-container-images-published

  attest-backend:
    name: Attest ${{ matrix.service }}
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true'
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - catalog
          - mcptools
          - basket
          - ordering
          - chatting
          - rating
          - notification
          - finance
          - scheduler
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions/dotnet-attest
          fetch-depth: 1

      - name: Attest container image
        uses: ./.github/actions/dotnet-attest
        with:
          service: ${{ matrix.service }}
          repository: ${{ github.repository }}
          token: ${{ github.token }}
