name: OpenSSF Scorecard
run-name: OpenSSF Scorecard - ${{ github.event_name }} by ${{ github.actor }}

on:
  push:
    branches:
      - main
  schedule:
    # Runs every Thursday at 10:00 AM Asia/Ho_Chi_Minh (UTC+7)
    - cron: 0 3 * * 4
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    name: 🛡️ Scorecard Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🛡️ Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: ⬆️ Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: ⬆️ Upload Scorecard results to code scanning
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
          category: openssf-scorecard
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
