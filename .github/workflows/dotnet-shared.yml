name: .NET Shared CI Pipeline
run-name: .NET Shared CI

on:
  workflow_call:

env:
  GLOBAL_JSON_PATH: ${{ github.workspace }}/global.json
  BUN_VERSION_FILE: ${{ github.workspace }}/.bun-version

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Security Scan
        uses: ./.github/actions/security-scan

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Format
        uses: ./.github/actions/format
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}
          bun-version-file: ${{ env.BUN_VERSION_FILE }}

  style:
    name: Style
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Style
        uses: ./.github/actions/style
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}
          bun-version-file: ${{ env.BUN_VERSION_FILE }}

  analyzers:
    name: Analyzers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Analyzers
        uses: ./.github/actions/analyzers
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}
          bun-version-file: ${{ env.BUN_VERSION_FILE }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [security-scan, format, style, analyzers]
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Build
        uses: ./.github/actions/build
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}
          bun-version-file: ${{ env.BUN_VERSION_FILE }}

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [security-scan, format, style, analyzers]
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Test
        uses: ./.github/actions/test
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}
          bun-version-file: ${{ env.BUN_VERSION_FILE }}
