name: Frontend Shared CI Pipeline
run-name: Frontend Shared CI

on:
  workflow_call:
    inputs:
      retention-days:
        description: Number of days to retain artifacts
        type: number
        default: 7
    secrets:
      TURBO_TOKEN:
        description: Turborepo remote cache token
        required: false

permissions: {}

jobs:
  lint-build-test:
    name: 🧪 Lint, Build & Test
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_SCM_BASE:
        ${{ github.event.pull_request.base.sha || github.event.before ||
        'HEAD~1' }}
      TURBO_SCM_HEAD: ${{ github.sha }}
      FRONTEND_APPS_DIR: src/Clients/apps

    defaults:
      run:
        working-directory: src/Clients

    steps:
      - name: 📥 Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # fetch-depth: 0 ensures the base SHA from pull_request/push events is always available
          fetch-depth: 0

      - name: 🎨 Setup Frontend
        uses: ./.github/actions/frontend-setup

      - name: 🧹 Lint
        run: ./node_modules/.bin/turbo run lint --affected

      - name: 🔨 Build
        run: ./node_modules/.bin/turbo run build --affected

      - name: 🧪 Test
        run: ./node_modules/.bin/turbo run test --affected

      - name: 📊 Generate Allure Reports
        if: ${{ !cancelled() }}
        run: ./node_modules/.bin/turbo run allure:generate --affected --continue

      - name: ⬆️ Upload Allure Report (Backoffice)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: allure-report-backoffice
          path: ${{ env.FRONTEND_APPS_DIR }}/backoffice/allure-report/
          retention-days: ${{ inputs.retention-days }}
          if-no-files-found: ignore

      - name: ⬆️ Upload Allure Report (Storefront)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: allure-report-storefront
          path: ${{ env.FRONTEND_APPS_DIR }}/storefront/allure-report/
          retention-days: ${{ inputs.retention-days }}
          if-no-files-found: ignore

      - name: 📊 Post Allure Summary (Backoffice)
        if: |
          ${{ !cancelled() && hashFiles('src/Clients/apps/backoffice/allure-report/index.html') != '' }}
        uses: allure-framework/allure-action@e423746d05c43b4bea93d994acaac64a40521ccf # v0.7.1
        with:
          report-directory: ${{ env.FRONTEND_APPS_DIR }}/backoffice/allure-report
          github-token: ${{ github.token }}

      - name: 📊 Post Allure Summary (Storefront)
        if: |
          ${{ !cancelled() && hashFiles('src/Clients/apps/storefront/allure-report/index.html') != '' }}
        uses: allure-framework/allure-action@e423746d05c43b4bea93d994acaac64a40521ccf # v0.7.1
        with:
          report-directory: ${{ env.FRONTEND_APPS_DIR }}/storefront/allure-report
          github-token: ${{ github.token }}
