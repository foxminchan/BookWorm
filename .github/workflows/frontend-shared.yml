name: Frontend Shared CI Pipeline
run-name: Frontend Shared CI

on:
  workflow_call:
    inputs:
      retention-days:
        description: "Number of days to retain artifacts"
        type: number
        default: 7
    secrets:
      TURBO_TOKEN:
        description: "Turborepo remote cache token"
        required: false

permissions: {}

jobs:
  lint-build-test:
    name: Lint, Build & Test
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || github.event.before || 'HEAD~1' }}
      TURBO_SCM_HEAD: ${{ github.sha }}

    defaults:
      run:
        working-directory: src/Clients

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # fetch-depth: 2 is needed for Turbo's change detection (compares HEAD~1)
          fetch-depth: 2

      - name: Setup Frontend
        uses: ./.github/actions/frontend-setup

      - name: Lint
        run: pnpm turbo run lint --affected

      - name: Build
        run: pnpm turbo run build --affected

      - name: Test
        run: pnpm turbo run test --affected

      - name: Generate Allure Reports
        if: ${{ !cancelled() }}
        run: pnpm turbo run allure:generate --affected --continue

      - name: Upload Allure Report (Backoffice)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: allure-report-backoffice
          path: src/Clients/apps/backoffice/allure-report/
          retention-days: ${{ inputs.retention-days }}
          if-no-files-found: ignore

      - name: Upload Allure Report (Storefront)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: allure-report-storefront
          path: src/Clients/apps/storefront/allure-report/
          retention-days: ${{ inputs.retention-days }}
          if-no-files-found: ignore

      - name: Post Allure Summary (Backoffice)
        if: ${{ !cancelled() && hashFiles('src/Clients/apps/backoffice/allure-report/index.html') != '' }}
        uses: allure-framework/allure-action@c24234151c027cfee99e00eb6ec2dac1eb350414 # v0.3.0
        with:
          report-directory: src/Clients/apps/backoffice/allure-report
          github-token: ${{ github.token }}

      - name: Post Allure Summary (Storefront)
        if: ${{ !cancelled() && hashFiles('src/Clients/apps/storefront/allure-report/index.html') != '' }}
        uses: allure-framework/allure-action@c24234151c027cfee99e00eb6ec2dac1eb350414 # v0.3.0
        with:
          report-directory: src/Clients/apps/storefront/allure-report
          github-token: ${{ github.token }}
