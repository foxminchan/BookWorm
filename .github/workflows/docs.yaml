name: BookWorm Documentation
run-name: Docs Build - ${{ github.actor }} (${{ github.ref_name }})

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/docs.yaml
      - docs/docusaurus/**
  workflow_run:
    workflows:
      - BookWorm CI (Frontend)
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BUN_VERSION_FILE: .bun-version

jobs:
  build:
    name: Build Documentation
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.2
        with:
          bun-version-file: ${{ env.BUN_VERSION_FILE }}

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('docs/docusaurus/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install dependencies
        run: bun install
        working-directory: docs/docusaurus

      - name: Build documentation
        run: bun run build
        working-directory: docs/docusaurus

      - name: Download Allure Report (Backoffice)
        uses: dawidd6/action-download-artifact@8305c0f1062bb0d184d09ef4493ecb9288447732 # v20
        with:
          name: allure-report-backoffice
          path: docs/docusaurus/build/reports/backoffice
          workflow: frontend-ci.yml
          workflow_search: true
          branch: main
          event: push
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Download Allure Report (Storefront)
        uses: dawidd6/action-download-artifact@8305c0f1062bb0d184d09ef4493ecb9288447732 # v20
        with:
          name: allure-report-storefront
          path: docs/docusaurus/build/reports/storefront
          workflow: frontend-ci.yml
          workflow_search: true
          branch: main
          event: push
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/docusaurus/build

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
