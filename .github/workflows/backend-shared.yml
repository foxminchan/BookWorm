name: Backend Shared CI Pipeline
run-name: Backend Shared CI

on:
  workflow_call:

permissions: {}

env:
  GLOBAL_JSON_PATH: global.json
  BUN_VERSION_FILE: .bun-version
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  format:
    name: 💅 Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: 💅 Format
        uses: ./.github/actions/format
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}
          bun-version-file: ${{ env.BUN_VERSION_FILE }}

  style:
    name: 💅 Style
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: 💅 Style
        uses: ./.github/actions/style
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}
          bun-version-file: ${{ env.BUN_VERSION_FILE }}

  analyzers:
    name: 🔎 Analyzers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: 🧪 Analyzers
        uses: ./.github/actions/analyzers
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}
          bun-version-file: ${{ env.BUN_VERSION_FILE }}

  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs:
      - format
      - style
      - analyzers
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: 🔨 Build
        uses: ./.github/actions/build
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}
          bun-version-file: ${{ env.BUN_VERSION_FILE }}

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs:
      - format
      - style
      - analyzers
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: 🧪 Test
        uses: ./.github/actions/test
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}
          bun-version-file: ${{ env.BUN_VERSION_FILE }}
