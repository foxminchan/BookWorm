name: CodeQL Analysis
run-name: CodeQL Analysis - ${{ github.event_name }} by ${{ github.actor }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "**/*.mdx"
      - "**/*.txt"
      - "**/*.json"
  schedule:
    # Runs every Wednesday at 10:00 AM Asia/Ho_Chi_Minh (UTC+7)
    - cron: 0 3 * * 3

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  GLOBAL_JSON_PATH: global.json

jobs:
  analyze:
    name: 🔍 Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - language: csharp
            build-mode: manual
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: 🛡️ Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: ${{ github.event_name == 'schedule' && 'security-extended' || '' }}
          dependency-caching: true

      - name: 🔧 Setup .NET
        if: matrix.build-mode == 'manual'
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}

      - name: 💾 Cache NuGet Packages
        if: matrix.build-mode == 'manual'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: |
            ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: 🔨 Build .NET solution
        if: matrix.build-mode == 'manual'
        run: >
          dotnet build
          --configuration Release
          --no-incremental
          -p:SkipK6Build=true
          -p:SkipKeycloakifyBuild=true

      - name: 🛡️ Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
